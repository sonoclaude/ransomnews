<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ransomNews · Press</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #1a1b2e;
  --surface: #20223a;
  --surface2: #272a45;
  --surface3: #2e3150;
  --border: #363a5e;
  --border2: #404470;
  --red: #ff0000;
  --red-dim: rgba(255,0,0,0.12);
  --white: #f0f0f5;
  --text: #dde1f5;
  --text-dim: #9099c8;
  --text-muted: #5a6090;
  --mono: 'Poppins', monospace;
  --sans: 'Poppins', sans-serif;
  --green: #00c896;
  --blue: #4d9fff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 15px; min-height: 100vh; }

/* ── NAVBAR ── */
nav {
  position: sticky; top: 0; z-index: 200;
  background: rgba(5,5,7,0.95); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px; height: 56px;
}
.nav-left { display: flex; align-items: center; gap: 4px; }
.nav-brand { font-family: var(--sans); font-size: 24px; font-weight: 700; color: var(--white); letter-spacing: 0.01em; user-select: none; text-decoration: none; }
.nav-brand-red { color: var(--red); }
.nav-social-sep { width: 1px; height: 20px; background: rgba(255,255,255,0.1); margin: 0 6px; }
.nav-home {
  display: flex; align-items: center; justify-content: center;
  width: 36px; height: 36px; border-radius: 8px;
  color: rgba(255,255,255,0.45); background: transparent; border: 1px solid transparent;
  transition: color 0.18s, background 0.18s, border-color 0.18s; text-decoration: none;
}
.nav-home svg { width: 22px; height: 22px; flex-shrink: 0; }
.nav-home:hover { color: #cc2233; background: rgba(204,34,51,0.1); border-color: rgba(204,34,51,0.25); }
.nav-right { display: flex; align-items: center; gap: 16px; }
.nav-api-btn {
  display: flex; align-items: center; gap: 7px;
  font-family: var(--mono); font-size: 15px; font-weight: 700; letter-spacing: 0.06em;
  color: rgba(255,255,255,0.45); text-decoration: none;
  background: transparent; border: 1px solid transparent; border-radius: 8px; padding: 6px 10px;
  transition: color 0.18s, background 0.18s, border-color 0.18s;
}
.nav-api-btn svg { width: 18px; height: 18px; flex-shrink: 0; }
.nav-api-btn:hover { color: #00c896; background: rgba(0,200,150,0.1); border-color: rgba(0,200,150,0.25); }
.nav-press-btn {
  display: flex; align-items: center; gap: 7px;
  font-family: var(--mono); font-size: 15px; font-weight: 700; letter-spacing: 0.06em;
  color: rgba(255,255,255,0.45); text-decoration: none;
  background: transparent; border: 1px solid transparent; border-radius: 8px; padding: 6px 10px;
  transition: color 0.18s, background 0.18s, border-color 0.18s;
}
.nav-press-btn svg { width: 18px; height: 18px; flex-shrink: 0; }
.nav-press-btn:hover, .nav-press-btn.active { color: rgba(255,255,255,0.95); background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.12); }
.nav-rss-btn {
  display: flex; align-items: center; gap: 7px;
  font-family: var(--mono); font-size: 15px; font-weight: 700; letter-spacing: 0.06em;
  color: rgba(255,255,255,0.45); text-decoration: none;
  background: transparent; border: 1px solid transparent; border-radius: 8px; padding: 6px 10px;
  transition: color 0.18s, background 0.18s, border-color 0.18s;
}
.nav-rss-btn svg { width: 18px; height: 18px; flex-shrink: 0; }
.nav-rss-btn:hover { color: #f0b429; background: rgba(240,180,41,0.1); border-color: rgba(240,180,41,0.25); }
.theme-switch { position: relative; width: 44px; height: 24px; cursor: pointer; flex-shrink: 0; }
.theme-track { position: absolute; inset: 0; background: var(--surface3); border: 1px solid var(--border2); border-radius: 24px; transition: background 0.3s, border-color 0.3s; }
.theme-switch.active .theme-track { background: rgba(230,57,70,0.15); border-color: rgba(230,57,70,0.4); }
.theme-thumb { position: absolute; top: 3px; left: 3px; width: 16px; height: 16px; background: var(--text-muted); border-radius: 50%; transition: transform 0.3s cubic-bezier(.4,0,.2,1), background 0.3s; pointer-events: none; z-index: 2; }
.theme-switch.active .theme-thumb { transform: translateX(20px); background: var(--red); }
.theme-icons { position: absolute; inset: 0; display: flex; align-items: center; justify-content: space-between; padding: 0 5px; pointer-events: none; z-index: 1; }
.theme-icons svg { width: 10px; height: 10px; transition: opacity 0.3s; }
.icon-moon { opacity: 0.6; } .icon-sun { opacity: 0.3; }
.theme-switch.active .icon-moon { opacity: 0.2; } .theme-switch.active .icon-sun { opacity: 0.9; }

/* ── PRESS PAGE ── */
/* ── Press Page ── */
.press-page { padding: 0 32px 60px; }

/* Hero box — replica esatta della dashboard */
.press-hero {
  padding: 28px 32px;
  margin: 28px 0 20px;
  background: var(--surface); transition: border-color .15s, background .15s;
  border: 1px solid var(--border);
  border-radius: 14px;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 0;
  padding: 24px 32px;
}
.press-hero:hover { background: var(--surface2); border-color: var(--border2); }
.press-hero::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.013) 40px, rgba(255,255,255,0.013) 41px);
  pointer-events: none;
}
.press-hero-inner { display: flex; flex-direction: row; align-items: center; justify-content: flex-start; gap: 24px; position: relative; width: 100%; }
.press-hero-logo { width: 110px; height: 110px; object-fit: contain; border-radius: 10px; flex-shrink: 0; }
.press-hero-text { min-width: 0; display: flex; flex-direction: column; justify-content: center; }
.press-hero-eyebrow {
  font-family: var(--mono); font-size: 12px; letter-spacing: 0.15em;
  color: var(--red); margin-bottom: 10px;
  display: flex; align-items: center; gap: 10px;
}
.press-hero-eyebrow::before { content: ''; display: inline-block; width: 24px; height: 1px; background: var(--red); }
.press-hero-title {
  font-family: var(--sans); font-size: clamp(28px, 4vw, 44px);
  font-weight: 600; color: var(--white); line-height: 1.1;
  letter-spacing: -0.02em; margin-bottom: 12px; white-space: nowrap;
}
.press-hero-sub { font-size: 16px; line-height: 1.6; color: var(--text-dim); white-space: nowrap; margin: 0; }

.press-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
@media (max-width: 1100px) { .press-grid { grid-template-columns: repeat(2,1fr); } }
@media (max-width: 650px)  { .press-grid { grid-template-columns: 1fr; } }

/* Card NEW badge */
.pcard-new { font-family:var(--mono); font-size:10px; font-weight:700; background:var(--red); color:#fff; padding:2px 7px; border-radius:4px; flex-shrink:0; }

/* Expand button */
.pcard-expand-btn { background:none; border:none; cursor:pointer; color:var(--white); font-size:14px; padding:2px 4px; border-radius:3px; transition:color 0.15s,background 0.15s; flex-shrink:0; line-height:1; margin-left:auto; }
.pcard-expand-btn:hover { background:rgba(255,255,255,0.12); }

/* Modal */
#pcard-modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:9000; align-items:center; justify-content:center; padding:20px; box-sizing:border-box; }
#pcard-modal-overlay.open { display:flex; }
#pcard-modal { background:var(--surface); border:1px solid var(--border2); border-radius:12px; padding:48px 32px 32px; width:100%; max-width:600px; max-height:90vh; overflow-y:auto; box-sizing:border-box; position:relative; }
#pcard-modal-close { position:absolute; top:12px; right:12px; background:var(--surface2); border:1px solid var(--border); cursor:pointer; color:var(--text-dim); font-size:16px; line-height:1; padding:5px 9px; border-radius:6px; transition:color 0.15s,background 0.15s; z-index:10; }
#pcard-modal-close:hover { color:var(--white); background:var(--surface2); }
.pmodal-top { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:14px; }
.pmodal-id { font-family:var(--mono); font-size:16px; font-weight:700; color:#4d9fff; }
.pmodal-date { font-family:var(--mono); font-size:14px; background:var(--surface2); color:var(--text-dim); padding:3px 10px; border-radius:4px; border:1px solid var(--border); }
.pmodal-new { font-family:var(--mono); font-size:12px; font-weight:700; background:var(--red); color:#fff; padding:3px 9px; border-radius:4px; }
.pmodal-name { font-size:24px; font-weight:700; color:var(--white); line-height:1.3; margin-bottom:6px; }
.pmodal-link { color:#4d9fff; text-decoration:none; font-size:14px; font-family:var(--mono); opacity:.8; }
.pmodal-link:hover { opacity:1; text-decoration:underline; }
.pmodal-div { border:none; border-top:1px solid var(--border); margin:16px 0; }
.pmodal-bottom { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; }
.pmodal-loc { display:flex; flex-direction:column; gap:8px; flex:1; }
.pmodal-row { font-size:16px; color:var(--text-muted); font-family:var(--mono); }
.pmodal-row .v { color:var(--text-dim); font-size:17px; }
.pmodal-fonte-wrap { display:flex; flex-direction:column; align-items:flex-end; gap:4px; flex-shrink:0; }
.pmodal-fonte-lbl { font-size:13px; color:var(--text-muted); font-family:var(--mono); }
.pmodal-fonte-link { font-family:var(--mono); font-size:15px; font-weight:700; color:#4d9fff; text-decoration:none; display:inline-flex; align-items:center; gap:5px; opacity:.8; transition:opacity .15s; }
.pmodal-fonte-link:hover { opacity:1; text-decoration:underline; }
@media (max-width:768px) { #pcard-modal { padding:20px 16px; } .pmodal-name { font-size:20px; } .pmodal-bottom { flex-direction:column; } }
.pcard { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px 16px; display:flex; flex-direction:column; justify-content:flex-start; gap:10px; transition:border-color .15s,background .15s; }
.pcard:hover { border-color:var(--border2); background:var(--surface2); }
.pcard-top { display:flex; align-items:center; gap:8px; overflow:visible; justify-content:space-between; }
.pcard-id { font-family:var(--mono); font-size:13px; font-weight:700; color:#4d9fff; flex-shrink:0; }
.pcard-date { font-family:var(--mono); font-size:11px; background:var(--surface2); color:var(--text-dim); padding:2px 7px; border-radius:4px; border:1px solid var(--border); flex-shrink:0; }
.pcard-name { font-size:15px; font-weight:600; color:var(--white); line-height:1.35; margin-bottom:4px; }
.pcard-sitelink { color:#4d9fff; text-decoration:none; font-size:11px; font-family:var(--mono); opacity:.75; }
.pcard-sitelink:hover { opacity:1; text-decoration:underline; }
.pcard-div { border:none; border-top:1px solid var(--border); }
.pcard-bottom { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
.pcard-loc { display:flex; flex-direction:column; gap:4px; flex:1; min-width:0; }
.pcard-row { font-size:11px; color:var(--text-muted); font-family:var(--mono); }
.pcard-row .v { color:var(--text-dim); font-size:12px; }
.pcard-sym { opacity:.65; margin-right:2px; }
.pcard-fonte-wrap { display:flex; flex-direction:column; align-items:flex-end; gap:2px; flex-shrink:0; }
.pcard-fonte-lbl { font-size:10px; color:var(--text-muted); font-family:var(--mono); white-space:nowrap; }
.pcard-fonte-link { font-family:var(--mono); font-size:12px; font-weight:700; color:#4d9fff; text-decoration:none; display:inline-flex; align-items:center; gap:4px; opacity:.75; transition:opacity .15s; }
.pcard-fonte-link:hover { opacity:1; text-decoration:underline; }

/* ── Pager ── */
.pager { display:flex; justify-content:flex-start; align-items:center; gap:4px; padding:14px 0 20px; font-family:var(--mono); }
.pager-btn { min-width:32px; height:28px; padding:0 8px; background:var(--surface2); border:1px solid var(--border); border-radius:3px; color:var(--text-muted); font-family:var(--mono); font-size:14px; cursor:pointer; transition:border-color 0.15s,color 0.15s; }
.pager-btn:hover:not([disabled]) { border-color:var(--red); color:var(--white); }
.pager-btn.active { background:var(--red); border-color:var(--red); color:#fff; font-weight:700; }
.pager-btn[disabled] { opacity:0.3; cursor:default; }
.pager-ellipsis { color:var(--text-muted); font-size:14px; padding:0 2px; }
#pressPager { padding: 0 32px 48px; }
.site-footer { margin: 30px 32px; padding: 16px 24px; border-top: 1px solid var(--border); font-family: var(--mono); font-size: 13px; color: var(--text-muted); }
.footer-container { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
.footer-left, .footer-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.footer-left a { color: var(--text); text-decoration: none; }
.footer-left a:hover { color: var(--red); }
.sep, .dot { opacity: 0.4; }
html.light { --bg:#f0f0f5; --surface:#ffffff; --surface2:#e8e8f0; --surface3:#dcdce8; --border:#c8c8d8; --border2:#b8b8cc; --red:#c8222e; --white:#0a0a12; --text:#2a2a3a; --text-dim:#4a4a62; --text-muted:#8888a4; --blue:#1a6fd4; }
html.light body { background:var(--bg); color:var(--text); }
html.light nav { background:rgba(240,240,245,0.95); border-bottom-color:var(--border); }

.pcard-watermark { font-family:var(--sans); font-size:14px; font-weight:700; padding:3px 10px 3px 8px; flex-shrink:0; white-space:nowrap; color:var(--white); }
.pmodal-note { font-size:13px; color:#f5a623; font-family:var(--mono); margin-top:10px; display:block; line-height:1.6; } .pmodal-note span { display:block; }
.pcard-note { font-size:12px; color:#f5a623; font-family:var(--mono); margin-top:8px; display:block; line-height:1.6; grid-column:1/-1; } .pcard-note span { display:block; }
.press-year-bar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin: 0 0 20px;
  display: flex;
  padding: 0 24px 12px;
  flex-wrap: wrap;
}
.press-year-btn {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.08em;
  padding: 12px 20px;
  color: var(--text-muted);
  cursor: pointer;
  border: none;
  border-bottom: 2px solid transparent;
  background: transparent;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
}
.press-year-btn:hover { color: var(--text); }
.press-year-btn.active { color: var(--red); border-bottom-color: var(--red); }
.press-year-count {
  background: rgba(255,255,255,0.06);
  border-radius: 2px;
  padding: 1px 6px;
  font-size: 12px;
}

/* ── Mobile: nascondi hero e year bar ── */
@media only screen and (max-width: 480px) {
  .press-hero { display: none !important; }
  .press-year-bar { display: none !important; }
  .press-page { padding-top: 16px; }
}
</style>
</head>

var PAGE_SIZE_PRESS = 30;

var selectedYearPress = "all";

function buildYearBar() {
  var bar = document.getElementById("pressYearBar");
  if (!bar) return;
  var counts = {};
  DATA_PRESS.forEach(function(r) {
    var parts = r.DATA ? r.DATA.split("/") : [];
    var y = parts.length >= 3 ? parts[2] : (parts.length === 2 ? parts[1] : "?");
    counts[y] = (counts[y]||0) + 1;
  });
  var years = Object.keys(counts).sort(function(a,b){ return b-a; });
  var total = DATA_PRESS.length;
  var html = "<button class=\"press-year-btn" + (selectedYearPress==="all" ? " active" : "") + "\" onclick=\"filterYear(&apos;all&apos;)\">Tutti <span class=\"press-year-count\">" + total + "</span></button>";
  years.forEach(function(y) {
    html += "<button class=\"press-year-btn" + (selectedYearPress===y ? " active" : "") + "\" onclick=\"filterYear(&apos;" + y + "&apos;)\">" + y + " <span class=\"press-year-count\">" + counts[y] + "</span></button>";
  });
  bar.innerHTML = html;
}

function filterYear(y) {
  selectedYearPress = y;
  currentPagePress = 1;
  buildYearBar();
  renderGrid();
}

var currentPagePress = 1;

function buildPagerHTML(current, total, fnName) {
  if (total <= 1) return '';
  var html = '<div class="pager">';
  html += '<button class="pager-btn" onclick="' + fnName + '(' + (current-1) + ')" ' + (current===1?'disabled':'') + '>‹</button>';
  var delta = 2;
  var pages = new Set([1, total]);
  for (var i = Math.max(2, current-delta); i <= Math.min(total-1, current+delta); i++) pages.add(i);
  var sorted = Array.from(pages).sort(function(a,b){return a-b;});
  var prev = 0;
  sorted.forEach(function(p) {
    if (prev && p - prev > 1) html += '<span class="pager-ellipsis">…</span>';
    html += '<button class="pager-btn' + (p===current?' active':'') + '" onclick="' + fnName + '(' + p + ')">' + p + '</button>';
    prev = p;
  });
  html += '<button class="pager-btn" onclick="' + fnName + '(' + (current+1) + ')" ' + (current===total?'disabled':'') + '>›</button>';
  html += '</div>';
  return html;
}

function goPagePress(p) {
  currentPagePress = p;
  renderGrid();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function getLatestRecord() {
  return DATA_PRESS[DATA_PRESS.length - 1];
}

function getFonteDomain(url) {
  try { return new URL(url).hostname.replace('www.',''); } catch(e) { return 'fonte'; }
}

function renderGrid() {
  var grid = document.getElementById('pressGrid');
  var pagerEl = document.getElementById('pressPager');
  var countEl = document.getElementById('pressCount');
  if (!grid) return;
  var all = DATA_PRESS.slice().reverse();
  var reversed = (selectedYearPress === "all") ? all : all.filter(function(r){ var p=r.DATA?r.DATA.split("/"):[]; var y=p.length>=3?p[2]:(p.length===2?p[1]:"?"); return y===selectedYearPress; });
  var total = reversed.length;
  var tp = Math.max(1, Math.ceil(total / PAGE_SIZE_PRESS));
  if (currentPagePress > tp) currentPagePress = tp;
  if (countEl) countEl.textContent = total + ' eventi';
  var start = (currentPagePress - 1) * PAGE_SIZE_PRESS;
  var page = reversed.slice(start, start + PAGE_SIZE_PRESS);
  var latest = getLatestRecord();
  grid.innerHTML = page.map(function(r) {
    var isNew = (r === latest);
    var newBadge = isNew ? '<span class="pcard-new">NEW</span>' : '';
    return '<div class="pcard">'
      + '<div class="pcard-top">'
      +   '<span class="pcard-id">' + r.ID + '</span>'
      +   '<span class="pcard-date">' + r.DATA + '</span>'
      +   newBadge
      +   '<div style="display:flex;align-items:center;gap:6px;margin-left:auto;"><span class="pcard-watermark">ransom<span style="color:var(--red)">News</span> Press</span><button class="pcard-expand-btn" data-pid="' + r.ID + '" title="Espandi" aria-label="Espandi card">⤢</button></div>'
      + '</div>'
      + '<div>'
      +   '<div class="pcard-name">' + r.VITTIMA + '</div>'
      +   (r.LINK ? '<a class="pcard-sitelink" href="https://' + r.LINK + '" target="_blank" rel="noopener">' + r.LINK + '</a>' : '')
      + '</div>'
      + '<hr class="pcard-div">'
      + '<div class="pcard-bottom">'
      +   '<div class="pcard-loc">'
      +     '<span class="pcard-row"><span class="pcard-sym">◎</span><span style="color:var(--text-muted)"> Provincia:</span> <span class="v">' + (r.PROVINCIA||'—') + '</span></span>'
      +     '<span class="pcard-row"><span class="pcard-sym">◈</span><span style="color:var(--text-muted)"> Regione:</span> <span class="v">' + (r.REGIONE||'—') + '</span></span>'
      +     (r.NOTE ? '<span class="pcard-note"><span>' + r.NOTE.replace(' | ', '</span><span>') + '</span></span>' : '')
      +   '</div>'
      +   '<div class="pcard-fonte-wrap">'
      +     '<span class="pcard-fonte-lbl">Fonte</span>'
      +     '<a class="pcard-fonte-link" href="' + r.FONTE + '" target="_blank" rel="noopener">'
      +       '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="11" height="11"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>'
      +       getFonteDomain(r.FONTE)
      +     '</a>'
      +   '</div>'
      + '</div>'
      + '</div>';
  }).join('');
  if (pagerEl) pagerEl.innerHTML = buildPagerHTML(currentPagePress, tp, 'goPagePress');
}

function openPressModal(r) {
  var latest = getLatestRecord();
  var isNew = (r === latest);
  var nb = isNew ? '<span class="pmodal-new">NEW</span>' : '';
  document.getElementById('pcard-modal-content').innerHTML =
    '<div class="pmodal-top">'
    + '<span class="pmodal-id">' + r.ID + '</span>'
    + '<span class="pmodal-date">' + r.DATA + '</span>'
    + nb
    + '</div>'
    + '<div class="pmodal-name">' + r.VITTIMA + '</div>'
    + (r.LINK ? '<a class="pmodal-link" href="https://' + r.LINK + '" target="_blank" rel="noopener">' + r.LINK + '</a>' : '')
    + '<hr class="pmodal-div">'
    + '<div class="pmodal-bottom">'
    +   '<div class="pmodal-loc">'
    +     '<span class="pmodal-row"><span style="opacity:.65">◎</span><span style="color:var(--text-muted)"> Provincia:</span> <span class="v">' + (r.PROVINCIA||'—') + '</span></span>'
    +     '<span class="pmodal-row"><span style="opacity:.65">◈</span><span style="color:var(--text-muted)"> Regione:</span> <span class="v">' + (r.REGIONE||'—') + '</span></span>'
    +     (r.NOTE ? '<span class="pmodal-note"><span>' + r.NOTE.replace(' | ', '</span><span>') + '</span></span>' : '')
    +   '</div>'
    +   '<div class="pmodal-fonte-wrap">'
    +     '<span class="pmodal-fonte-lbl">Fonte</span>'
    +     '<a class="pmodal-fonte-link" href="' + r.FONTE + '" target="_blank" rel="noopener">'
    +       '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="13" height="13"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>'
    +       getFonteDomain(r.FONTE)
    +     '</a>'
    +   '</div>'
    + '</div>';
  document.getElementById('pcard-modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closePressModal() {
  document.getElementById('pcard-modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function toggleTheme() {
  var isLight = document.documentElement.classList.toggle('light');
  document.getElementById('themeSwitch').classList.toggle('active', isLight);
}

document.addEventListener('DOMContentLoaded', function() {
  buildYearBar();
  renderGrid();
  document.getElementById('pcard-modal-close').addEventListener('click', closePressModal);
  document.getElementById('pcard-modal-overlay').addEventListener('click', function(e) {
    if (e.target === this) closePressModal();
  });
  document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closePressModal(); });
  document.addEventListener('click', function(e) {
    var btn = e.target.closest('.pcard-expand-btn');
    if (btn) {
      var pid = btn.getAttribute('data-pid');
      var rec = DATA_PRESS.find(function(r) { return r.ID === pid; });
      if (rec) openPressModal(rec);
    }
  });

  // Footer meta
  var d = new Date();
  var data = d.toLocaleDateString('it-IT');
  var ora = d.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
  var upEl = document.getElementById('lastUpdate');
  var verEl = document.getElementById('footer-version');
  if (upEl) upEl.textContent = 'Ultimo aggiornamento dati: ' + data + ' - ' + ora;
  if (verEl) verEl.textContent = 'TEST_PRESS_210b';
});
</script>
